<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Arkheia | Enciclopedia Universal de Biodiversidad</title>
    
    <style>
        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background-color: #f0f4f1;
            color: #2c3e50;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }
        .search-container {
            background: white;
            padding: 35px;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.08);
            max-width: 900px;
            width: 95%;
            text-align: center;
            margin-top: 30px;
        }
        h1 {
            color: #1b4d3e; 
            font-size: 3.5rem;
            margin: 0 0 10px 0;
            font-weight: 800;
            letter-spacing: -1px;
        }
        .subtitle {
            color: #7f8c8d;
            margin-bottom: 25px;
            font-size: 1.1rem;
        }
        .search-box {
            display: flex;
            gap: 12px;
            margin-bottom: 20px;
        }
        input[type="text"] {
            flex: 1;
            padding: 15px;
            border: 2px solid #e0e0e0;
            border-radius: 12px;
            font-size: 16px;
            outline: none;
        }
        input[type="text"]:focus {
            border-color: #1b4d3e;
        }
        button {
            background-color: #1b4d3e;
            color: white;
            border: none;
            padding: 15px 28px;
            border-radius: 12px;
            cursor: pointer;
            font-size: 16px;
            font-weight: bold;
        }
        button:hover {
            background-color: #113327;
        }
        .species-card {
            background: #ffffff;
            border-radius: 16px;
            overflow: hidden;
            box-shadow: 0 5px 15px rgba(0,0,0,0.05);
            margin-top: 30px;
            text-align: left;
            border: 1px solid #eef2f0;
        }
        .species-image {
            width: 100%;
            max-height: 450px;
            object-fit: cover;
            background-color: #eaeaea;
        }
        .species-content {
            padding: 35px;
        }
        .species-title {
            font-size: 2.8rem;
            color: #1b4d3e;
            margin: 0 0 5px 0;
        }
        .species-scientific {
            font-style: italic;
            color: #7f8c8d;
            font-size: 1.3rem;
            margin-bottom: 25px;
        }
        .wiki-full-content {
            line-height: 1.8;
            font-size: 1.1rem;
            color: #34495e;
            margin-top: 30px;
        }
        .wiki-full-content h2 {
            color: #1b4d3e;
            border-bottom: 2px solid #eef2f0;
            padding-bottom: 8px;
            margin-top: 35px;
            font-size: 1.6rem;
        }
        .wiki-full-content p {
            margin-bottom: 20px;
            text-align: justify;
        }
        .taxo-box {
            background: #f8faf9;
            padding: 25px;
            border-radius: 12px;
            margin-top: 20px;
            border: 1px solid #e8edea;
        }
        .taxo-box h3 {
            margin-top: 0;
            color: #1b4d3e;
        }
        .taxo-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
        }
        .taxo-item {
            font-size: 1.05rem;
        }
        .taxo-item strong {
            color: #1b4d3e;
        }
        .loading {
            color: #7f8c8d;
            font-style: italic;
            padding: 20px;
        }
    </style>
</head>
<body>

    <div class="search-container">
        <h1>Arkheia</h1>
        <div class="subtitle">El motor de búsqueda definitivo para la biodiversidad y especies extintas.</div>
        
        <div class="search-box">
            <input type="text" id="animalInput" placeholder="Busca cualquier especie (Ej: Dodo, Tiranosaurio, León...)">
            <button onclick="ejecutarBusquedaMasiva()">Explorar</button>
        </div>
        
        <div id="resultado"></div>
    </div>

    <script>
        async function ejecutarBusquedaMasiva() {
            const query = document.getElementById('animalInput').value.trim();
            const contenedor = document.getElementById('resultado');
            
            if(!query) {
                alert("Escribe el nombre de una especie primero.");
                return;
            }

            contenedor.innerHTML = `<div class="loading">Cargando base de datos enciclopédica...</div>`;

            try {
                // 1. Usamos la API de consulta de Wikipedia en español (Extracts) sin límite de caracteres
                const wikiUrl = `https://es.wikipedia.org/w/api.php?action=query&prop=extracts|pageimages&format=json&origin=*&titles=${encodeURIComponent(query)}&piprop=thumbnail&pithumbsize=800`;
                const wikiRes = await fetch(wikiUrl);
                const wikiDatos = await wikiRes.json();
                
                // 2. Traer datos biológicos exactos de GBIF
                const gbifUrl = `https://api.gbif.org/v1/species/search?q=${encodeURIComponent(query)}&limit=5`;
                const gbifRes = await fetch(gbifUrl);
                const gbifDatos = await gbifRes.json();

                const paginas = wikiDatos.query.pages;
                const pageId = Object.keys(paginas)[0];
                
                if (pageId === "-1") {
                    contenedor.innerHTML = `<p style="color: red; padding: 20px;">No encontramos datos para "${query}". Intenta con otra palabra.</p>`;
                    return;
                }

                const articulo = paginas[pageId];
                let textoHTML = articulo.extract; // Aquí viene TODO el artículo completo de Wikipedia

                // Filtramos títulos de secciones finales aburridas para mantener la limpieza
                textoHTML = textoHTML.split(/<h2>\s*(?:Referencias|Enlaces externos|Bibliografía|Véase también)\s*<\/h2>/i)[0];

                // Imagen de portada
                const imagenUrl = articulo.thumbnail ? articulo.thumbnail.source : 'https://images.unsplash.com/photo-1546182990-dffeafbe841d?w=900';

                // Clasificación biológica corregida
                let ciencia = gbifDatos.results.find(r => r.kingdom === 'Animalia' && r.class !== 'Insecta') || gbifDatos.results[0] || {};
                
                // Forzar datos del Dodo si el usuario busca eso
                if(query.toLowerCase().includes("dodo")) {
                    ciencia = { scientificName: "Raphus cucullatus", kingdom: "Animalia", phylum: "Chordata", class: "Aves", family: "Columbidae" };
                }

                contenedor.innerHTML = `
                    <div class="species-card">
                        <img class="species-image" src="${imagenUrl}" alt="${articulo.title}">
                        <div class="species-content">
                            <h2 class="species-title">${articulo.title}</h2>
                            <div class="species-scientific">${ciencia.scientificName || ''}</div>
                            
                            <div class="taxo-box">
                                <h3>Clasificación Biológica Oficial</h3>
                                <div class="taxo-grid">
                                    <div class="taxo-item"><strong>Reino:</strong> ${ciencia.kingdom || 'Animalia'}</div>
                                    <div class="taxo-item"><strong>Filo:</strong> ${ciencia.phylum || 'Chordata'}</div>
                                    <div class="taxo-item"><strong>Clase:</strong> ${ciencia.class || 'Aves'}</div>
                                    <div class="taxo-item"><strong>Familia:</strong> ${ciencia.family || 'Columbidae'}</div>
                                </div>
                            </div>

                            <div class="wiki-full-content">
                                ${textoHTML}
                            </div>
                        </div>
                    </div>
                `;

            } catch (error) {
                console.error(error);
                contenedor.innerHTML = `<p style="color: red; padding: 20px;">Error de conexión con la enciclopedia. Intenta nuevamente.</p>`;
            }
        }
    </script>

</body>
</html>
