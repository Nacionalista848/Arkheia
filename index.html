<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Arkheia | Enciclopedia de Anatomía Animal y Biología</title>
    
    <meta name="description" content="Arkheia - Enciclopedia Universal de Anatomía Animal y Registros Biológicos por Nacionalista848.">
    <meta name="keywords" content="Arkheia, Nacionalista848, enciclopedia, animales, anatomia, morfologia, esqueleto">
    <meta name="author" content="Nacionalista848">
    
    <style>
        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background-color: #f4f6f8;
            color: #2c3e50;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }
        .search-container {
            background: white;
            padding: 35px;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.06);
            max-width: 950px;
            width: 95%;
            text-align: center;
            margin-top: 30px;
        }
        h1 {
            color: #2c3e50; 
            font-size: 3.5rem;
            margin: 0 0 10px 0;
            font-weight: 800;
            letter-spacing: -1px;
        }
        .subtitle {
            color: #7f8c8d;
            margin-bottom: 25px;
            font-size: 1.1rem;
        }
        .search-box {
            display: flex;
            gap: 12px;
            margin-bottom: 20px;
        }
        input[type="text"] {
            flex: 1;
            padding: 15px;
            border: 2px solid #e0e0e0;
            border-radius: 12px;
            font-size: 16px;
            outline: none;
            transition: border-color 0.2s;
        }
        input[type="text"]:focus {
            border-color: #3498db;
        }
        button {
            background-color: #2c3e50;
            color: white;
            border: none;
            padding: 15px 28px;
            border-radius: 12px;
            cursor: pointer;
            font-size: 16px;
            font-weight: bold;
            transition: background-color 0.2s;
        }
        button:hover {
            background-color: #1a252f;
        }
        .species-card {
            background: #ffffff;
            border-radius: 16px;
            overflow: hidden;
            box-shadow: 0 5px 15px rgba(0,0,0,0.05);
            margin-top: 30px;
            text-align: left;
            border: 1px solid #eef2f3;
        }
        .species-image {
            width: 100%;
            max-height: 485px;
            object-fit: cover;
            background-color: #eaeaea;
        }
        .species-content {
            padding: 35px;
        }
        .species-title {
            font-size: 2.8rem;
            color: #2c3e50;
            margin: 0 0 5px 0;
        }
        .species-scientific {
            font-style: italic;
            color: #7f8c8d;
            font-size: 1.3rem;
            margin-bottom: 25px;
        }
        .info-wrapper {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-top: 20px;
        }
        @media (max-width: 820px) {
            .info-wrapper { grid-template-columns: 1fr; }
        }
        .taxo-box, .anatomy-box {
            background: #f8f9fa;
            padding: 24px;
            border-radius: 12px;
            border: 1px solid #e9ecef;
        }
        .taxo-box h3, .anatomy-box h3 {
            margin-top: 0;
            color: #2c3e50;
            font-size: 1.25rem;
            border-bottom: 1px solid #dee2e6;
            padding-bottom: 8px;
            margin-bottom: 14px;
        }
        .taxo-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
            font-size: 1rem;
        }
        .anatomy-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
            font-size: 1rem;
            line-height: 1.6;
            text-align: justify;
        }
        .taxo-item strong {
            color: #2c3e50;
        }
        .wiki-full-content {
            line-height: 1.8;
            font-size: 1.1rem;
            color: #34495e;
            margin-top: 35px;
        }
        .wiki-full-content h2 {
            color: #2c3e50;
            border-bottom: 2px solid #eef2f3;
            padding-bottom: 8px;
            margin-top: 35px;
            font-size: 1.6rem;
        }
        .wiki-full-content p {
            margin-bottom: 20px;
            text-align: justify;
        }
        .loading {
            color: #7f8c8d;
            font-style: italic;
            padding: 20px;
        }
    </style>
</head>
<body>

    <div class="search-container">
        <h1>Arkheia</h1>
        <div class="subtitle">Archivo documental de anatomía animal, registros biológicos y esqueleto óseo.</div>
        
        <div class="search-box">
            <input type="text" id="animalInput" placeholder="Busca un animal o hueso (Ej: Perro, Radio, Fémur, León...)">
            <button onclick="ejecutarBusquedaMasiva()">Analizar</button>
        </div>
        
        <div id="resultado"></div>
    </div>

    <script>
        async function ejecutarBusquedaMasiva() {
            let queryOriginal = document.getElementById('animalInput').value.trim();
            const contenedor = document.getElementById('resultado');
            
            if(!queryOriginal) {
                alert("Por favor, introduce un término de búsqueda.");
                return;
            }

            contenedor.innerHTML = `<div class="loading">Buscando en los registros bio-documentales masivos...</div>`;

            let queryProcesada = queryOriginal;
            let minuscula = queryOriginal.toLowerCase();
            const palabrasHueso = ["radio", "cubito", "cúbito", "femur", "fémur", "humero", "húmero", "tibia", "perone", "peroné", "pelvis", "craneo", "cráneo"];
            
            if (palabrasHueso.some(hueso => minuscula === hueso || minuscula === hueso + " el hueso" || minuscula === "hueso " + hueso)) {
                queryProcesada = queryOriginal + " hueso anatomia";
            }

            try {
                let searchUrl = `https://es.wikipedia.org/w/api.php?action=query&list=search&srsearch=${encodeURIComponent(queryProcesada)}&format=json&origin=*&srlimit=8`;
                let searchRes = await fetch(searchUrl);
                let searchDatos = await searchRes.json();

                if (!searchDatos.query.search || searchDatos.query.search.length === 0) {
                    contenedor.innerHTML = `<p style="color: red; padding: 20px;">No se localizó ningún registro para "${queryOriginal}". Intenta de nuevo.</p>`;
                    return;
                }

                let candidato = searchDatos.query.search[0];
                for(let item of searchDatos.query.search) {
                    let titulo = item.title.toLowerCase();
                    let extracto = item.snippet.toLowerCase();
                    if (titulo.includes("desambiguación") || extracto.includes("desambiguación") || extracto.includes("pueden referirse a")) {
                        continue;
                    }
                    candidato = item;
                    break;
                }

                let tituloCorregido = candidato.title;

                let wikiUrl = `https://es.wikipedia.org/w/api.php?action=query&prop=extracts|pageimages&format=json&origin=*&titles=${encodeURIComponent(tituloCorregido)}&redirects=1&piprop=thumbnail&pithumbsize=800`;
                let wikiRes = await fetch(wikiUrl);
                let wikiDatos = await wikiRes.json();

                let paginas = wikiDatos.query.pages;
                let pageId = Object.keys(paginas)[0];
                let articulo = paginas[pageId];
                
                let tituloOficial = articulo.title; 
                let textoHTML = articulo.extract || ""; 

                textoHTML = textoHTML.split(/<h2>\s*(?:Referencias|Enlaces externos|Bibliografía|Véase también)\s*<\/h2>/i)[0];
                const imagenUrl = articulo.thumbnail ? articulo.thumbnail.source : 'https://images.unsplash.com/photo-1448375240586-882707db888b?w=900';

                // Consulta de Taxonomía
                const gbifUrl = `https://api.gbif.org/v1/species/search?q=${encodeURIComponent(tituloOficial)}&limit=10`;
                const gbifRes = await fetch(gbifUrl);
                const gbifDatos = await gbifRes.json();

                let ciencia = {};
                if (gbifDatos.results && gbifDatos.results.length > 0) {
                    ciencia = gbifDatos.results.find(r => r.kingdom === 'Animalia') || gbifDatos.results[0];
                }

                let reino = ciencia.kingdom || "Animalia";
                let filo = ciencia.phylum || ciencia.division || "Chordata";
                let clase = ciencia.class || "Mammalia";
                let familia = ciencia.family || "Desconocida";
                let nombreCientifico = ciencia.scientificName || tituloOficial;

                if (tituloOficial.toLowerCase() === "perro") {
                    nombreCientifico = "Canis lupus familiaris"; reino = "Animalia"; filo = "Chordata"; clase = "Mammalia"; familia = "Canidae";
                } else if (tituloOficial.toLowerCase() === "león" || tituloOficial.toLowerCase() === "leon") {
                    nombreCientifico = "Panthera leo"; reino = "Animalia"; filo = "Chordata"; clase = "Mammalia"; familia = "Felidae";
                }

                const temporalDiv = document.createElement('div');
                temporalDiv.innerHTML = textoHTML;
                const parrafos = Array.from(temporalDiv.getElementsByTagName('p'));
                
                const palabrasAnatomia = ["mide", "peso", "esqueleto", "cráneo", "cuerpo", "patas", "garras", "pelo", "pelaje", "longitud", "cola", "articulación", "hueso", "músculo", "extremidad"];

                let parrafosFiltrados = [];
                for (let p of parrafos) {
                    let contenido = p.textContent.trim();
                    let textMin = contenido.toLowerCase();
                    let coincide = palabrasAnatomia.some(palabra => textMin.includes(palabra));
                    
                    if (coincide && contenido.length > 50) {
                        parrafosFiltrados.push(contenido);
                    }
                }

                let detallesEstructura = "";
                let nombreCajaDerecha = "Anatomía y Estructura Corporal";

                if (parrafosFiltrados.length >= 1) {
                    detallesEstructura = parrafosFiltrados.slice(0, 4).map(texto => `<p>${texto}</p>`).join("");
                } else {
                    nombreCajaDerecha = "Información General y Datos Clave";
                    let parrafosValidos = parrafos.filter(p => p.textContent.trim().length > 40);
                    detallesEstructura = parrafosValidos.slice(0, 4).map(p => `<p>${p.textContent.trim()}</p>`).join("");
                }

                contenedor.innerHTML = `
                    <div class="species-card">
                        <img class="species-image" src="${imagenUrl}" alt="${tituloOficial}">
                        <div class="species-content">
                            <h2 class="species-title">${tituloOficial}</h2>
                            <div class="species-scientific">${nombreCientifico}</div>
                            
                            <div class="info-wrapper">
                                <div class="taxo-box">
                                    <h3>Clasificación Biológica / Registro</h3>
                                    <div class="taxo-grid">
                                        <div class="taxo-item"><strong>Reino:</strong> ${reino}</div>
                                        <div class="taxo-item"><strong>Filo/División:</strong> ${filo}</div>
                                        <div class="taxo-item"><strong>Clase:</strong> ${clase}</div>
                                        <div class="taxo-item"><strong>Familia:</strong> ${familia}</div>
                                    </div>
                                </div>
                                
                                <div class="anatomy-box">
                                    <h3>${nombreCajaDerecha}</h3>
                                    <div class="anatomy-list">
                                        ${detallesEstructura}
                                    </div>
                                </div>
                            </div>

                            <div class="wiki-full-content">
                                ${textoHTML}
                            </div>
                        </div>
                    </div>
                `;

            } catch (error) {
                console.error(error);
                contenedor.innerHTML = `<p style="color: red; padding: 20px;">Error al conectar con los servidores centrales de documentación.</p>`;
            }
        }
    </script>

</body>
</html>
