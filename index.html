<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Arkheia | Enciclopedia Universal de Biodiversidad</title>
    
    <style>
        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background-color: #f0f4f1;
            color: #2c3e50;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }
        .search-container {
            background: white;
            padding: 35px;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.08);
            max-width: 900px;
            width: 95%;
            text-align: center;
            margin-top: 30px;
        }
        h1 {
            color: #1b4d3e; 
            font-size: 3.5rem;
            margin: 0 0 10px 0;
            font-weight: 800;
            letter-spacing: -1px;
        }
        .subtitle {
            color: #7f8c8d;
            margin-bottom: 25px;
            font-size: 1.1rem;
        }
        .search-box {
            display: flex;
            gap: 12px;
            margin-bottom: 20px;
        }
        input[type="text"] {
            flex: 1;
            padding: 15px;
            border: 2px solid #e0e0e0;
            border-radius: 12px;
            font-size: 16px;
            outline: none;
        }
        input[type="text"]:focus {
            border-color: #1b4d3e;
        }
        button {
            background-color: #1b4d3e;
            color: white;
            border: none;
            padding: 15px 28px;
            border-radius: 12px;
            cursor: pointer;
            font-size: 16px;
            font-weight: bold;
        }
        button:hover {
            background-color: #113327;
        }
        .species-card {
            background: #ffffff;
            border-radius: 16px;
            overflow: hidden;
            box-shadow: 0 5px 15px rgba(0,0,0,0.05);
            margin-top: 30px;
            text-align: left;
            border: 1px solid #eef2f0;
        }
        .species-image {
            width: 100%;
            max-height: 450px;
            object-fit: cover;
            background-color: #eaeaea;
        }
        .species-content {
            padding: 35px;
        }
        .species-title {
            font-size: 2.8rem;
            color: #1b4d3e;
            margin: 0 0 5px 0;
        }
        .species-scientific {
            font-style: italic;
            color: #7f8c8d;
            font-size: 1.3rem;
            margin-bottom: 25px;
        }
        
        /* Contenido del Artículo */
        .wiki-full-content {
            line-height: 1.8;
            font-size: 1.1rem;
            color: #34495e;
            margin-top: 30px;
        }
        .wiki-full-content h2 {
            color: #1b4d3e;
            border-bottom: 2px solid #eef2f0;
            padding-bottom: 8px;
            margin-top: 35px;
            font-size: 1.6rem;
        }
        .wiki-full-content p {
            margin-bottom: 20px;
            text-align: justify;
        }

        /* Ficha Taxonómica */
        .taxo-box {
            background: #f8faf9;
            padding: 25px;
            border-radius: 12px;
            margin-top: 20px;
            border: 1px solid #e8edea;
        }
        .taxo-box h3 {
            margin-top: 0;
            color: #1b4d3e;
        }
        .taxo-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
        }
        .taxo-item {
            font-size: 1.05rem;
        }
        .taxo-item strong {
            color: #1b4d3e;
        }
        .loading {
            color: #7f8c8d;
            font-style: italic;
            padding: 20px;
        }
    </style>
</head>
<body>

    <div class="search-container">
        <h1>Arkheia</h1>
        <div class="subtitle">El motor de búsqueda definitivo para la biodiversidad y especies extintas.</div>
        
        <div class="search-box">
            <input type="text" id="animalInput" placeholder="Busca cualquier especie (Ej: Dodo, Tiranosaurio, León, Lobo)">
            <button onclick="ejecutarBusquedaMasiva()">Explorar</button>
        </div>
        
        <div id="resultado"></div>
    </div>

    <script>
        async function ejecutarBusquedaMasiva() {
            const query = document.getElementById('animalInput').value.trim();
            const contenedor = document.getElementById('resultado');
            
            if(!query) {
                alert("Escribe el nombre de una especie primero.");
                return;
            }

            contenedor.innerHTML = `<div class="loading">Cargando base de datos masiva...</div>`;

            try {
                // 1. Wikipedia móvil para el texto estructurado completo
                const wikiUrl = `https://es.wikipedia.org/api/rest_v1/page/mobile-sections/${encodeURIComponent(query)}`;
                const wikiRes = await fetch(wikiUrl);
                
                // 2. Resumen rápido para la fotografía de portada
                const summaryUrl = `https://es.wikipedia.org/api/rest_v1/page/summary/${encodeURIComponent(query)}`;
                const summaryRes = await fetch(summaryUrl);
                
                // 3. Taxonomía biológica
                const gbifUrl = `https://api.gbif.org/v1/species/search?q=${encodeURIComponent(query)}&limit=10`;
                const gbifRes = await fetch(gbifUrl);

                if (!wikiRes.ok) {
                    contenedor.innerHTML = `<p style="color: red; padding: 20px;">No encontramos datos suficientes para "${query}". Prueba con otro nombre.</p>`;
                    return;
                }

                const wikiDatos = await wikiRes.json();
                const summaryDatos = await summaryRes.json();
                const gbifDatos = await gbifRes.json();

                // Procesamos y limpiamos las secciones del texto completo
                let textoHTML = "";
                if(wikiDatos.lead && wikiDatos.lead.sections) {
                    textoHTML += wikiDatos.lead.sections[0].text;
                }
                if(wikiDatos.remaining && wikiDatos.remaining.sections) {
                    wikiDatos.remaining.sections.forEach(sec => {
                        if(!["Referencias", "Enlaces externos", "Bibliografía", "Véase también"].includes(sec.line)) {
                            textoHTML += `<h2>${sec.line}</h2>` + sec.text;
                        }
                    });
                }

                // Limpieza total de etiquetas conflictivas o tablas rotas de Wikipedia
                textoHTML = textoHTML.replace(/<a\b[^>]*>/gi, "").replace(/<\/a>/gi, "");
                textoHTML = textoHTML.replace(/<table\b[^>]*>([\s\S]*?)<\/table>/gi, ""); 
                textoHTML = textoHTML.replace(/<div class="hatnote[^"]*">([\s\S]*?)<\/div>/gi, "");

                // Fotografía principal
                const imagenUrl = summaryDatos.thumbnail ? summaryDatos.thumbnail.source : 'https://images.unsplash.com/photo-1546182990-dffeafbe841d?w=900';

                // Ajuste biológico preciso
                let ciencia = gbifDatos.results.find(r => r.class === 'Aves' || r.kingdom === 'Animalia') || gbifDatos.results[0] || {};

                const nombreCientifico = ciencia.scientificName || summaryDatos.title || query;
                const reino = ciencia.kingdom || "Animalia";
                const filo = ciencia.phylum || "Chordata (Vertebrados)";
                const clase = ciencia.class || "Detallada en el texto";
                const familia = ciencia.family || "Revisar en el artículo";

                contenedor.innerHTML = `
                    <div class="species-card">
                        <img class="species-image" src="${imagenUrl}" alt="${summaryDatos.title}">
                        <div class="species-content">
                            <h2 class="species-title">${summaryDatos.title || query}</h2>
                            <div class="species-scientific">${nombreCientifico}</div>
                            
                            <div class="taxo-box">
                                <h3>Clasificación Biológica Oficial</h3>
                                <div class="taxo-grid">
                                    <div class="taxo-item"><strong>Reino:</strong> ${reino}</div>
                                    <div class="taxo-item"><strong>Filo:</strong> ${filo}</div>
                                    <div class="taxo-item"><strong>Clase:</strong> ${clase}</div>
                                    <div class="taxo-item"><strong>Familia:</strong> ${familia}</div>
                                </div>
                            </div>

                            <div class="wiki-full-content">
                                ${textoHTML}
                            </div>
                        </div>
                    </div>
                `;

            } catch (error) {
                console.error(error);
                contenedor.innerHTML = `<p style="color: red; padding: 20px;">Ocurrió un error al procesar la información de Arkheia.</p>`;
            }
        }
    </script>

</body>
</html>
