<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Arkheia | Enciclopedia Universal de Biodiversidad</title>
    
    <meta name="description" content="Arkheia - Enciclopedia Universal de Biodiversidad, Anatomía Animal y Botánica Global por Nacionalista848.">
    <meta name="keywords" content="Arkheia, Nacionalista848, enciclopedia, animales, plantas, botanica, anatomia, morfologia">
    <meta name="author" content="Nacionalista848">
    
    <style>
        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background-color: #f0f4f1;
            color: #2c3e50;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }
        .search-container {
            background: white;
            padding: 35px;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.08);
            max-width: 900px;
            width: 95%;
            text-align: center;
            margin-top: 30px;
        }
        h1 {
            color: #1b4d3e; 
            font-size: 3.5rem;
            margin: 0 0 10px 0;
            font-weight: 800;
            letter-spacing: -1px;
        }
        .subtitle {
            color: #7f8c8d;
            margin-bottom: 25px;
            font-size: 1.1rem;
        }
        .search-box {
            display: flex;
            gap: 12px;
            margin-bottom: 20px;
        }
        input[type="text"] {
            flex: 1;
            padding: 15px;
            border: 2px solid #e0e0e0;
            border-radius: 12px;
            font-size: 16px;
            outline: none;
        }
        input[type="text"]:focus {
            border-color: #1b4d3e;
        }
        button {
            background-color: #1b4d3e;
            color: white;
            border: none;
            padding: 15px 28px;
            border-radius: 12px;
            cursor: pointer;
            font-size: 16px;
            font-weight: bold;
        }
        button:hover {
            background-color: #113327;
        }
        .species-card {
            background: #ffffff;
            border-radius: 16px;
            overflow: hidden;
            box-shadow: 0 5px 15px rgba(0,0,0,0.05);
            margin-top: 30px;
            text-align: left;
            border: 1px solid #eef2f0;
        }
        .species-image {
            width: 100%;
            max-height: 450px;
            object-fit: cover;
            background-color: #eaeaea;
        }
        .species-content {
            padding: 35px;
        }
        .species-title {
            font-size: 2.8rem;
            color: #1b4d3e;
            margin: 0 0 5px 0;
        }
        .species-scientific {
            font-style: italic;
            color: #7f8c8d;
            font-size: 1.3rem;
            margin-bottom: 25px;
        }
        
        /* Bloques de Datos de la Ficha */
        .info-wrapper {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-top: 20px;
        }
        @media (max-width: 768px) {
            .info-wrapper { grid-template-columns: 1fr; }
        }
        .taxo-box, .anatomy-box {
            background: #f8faf9;
            padding: 22px;
            border-radius: 12px;
            border: 1px solid #e8edea;
        }
        .taxo-box h3, .anatomy-box h3 {
            margin-top: 0;
            color: #1b4d3e;
            font-size: 1.2rem;
            border-bottom: 1px solid #e2e8e4;
            padding-bottom: 6px;
            margin-bottom: 12px;
        }
        .taxo-grid, .anatomy-list {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
            font-size: 1rem;
        }
        .anatomy-list {
            grid-template-columns: 1fr;
        }
        .taxo-item strong, .anatomy-item strong {
            color: #1b4d3e;
        }

        /* Texto Completo */
        .wiki-full-content {
            line-height: 1.8;
            font-size: 1.1rem;
            color: #34495e;
            margin-top: 35px;
        }
        .wiki-full-content h2 {
            color: #1b4d3e;
            border-bottom: 2px solid #eef2f0;
            padding-bottom: 8px;
            margin-top: 35px;
            font-size: 1.6rem;
        }
        .wiki-full-content p {
            margin-bottom: 20px;
            text-align: justify;
        }
        .loading {
            color: #7f8c8d;
            font-style: italic;
            padding: 20px;
        }
    </style>
</head>
<body>

    <div class="search-container">
        <h1>Arkheia</h1>
        <div class="subtitle">El motor de búsqueda definitivo para la biodiversidad, plantas y especies extintas.</div>
        
        <div class="search-box">
            <input type="text" id="animalInput" placeholder="Busca un animal o planta (Ej: Dodo, Girasol, Pino, León...)">
            <button onclick="ejecutarBusquedaMasiva()">Explorar</button>
        </div>
        
        <div id="resultado"></div>
    </div>

    <script>
        async function ejecutarBusquedaMasiva() {
            const query = document.getElementById('animalInput').value.trim();
            const contenedor = document.getElementById('resultado');
            
            if(!query) {
                alert("Escribe el nombre de una especie primero.");
                return;
            }

            contenedor.innerHTML = `<div class="loading">Escaneando archivos biológicos y botánicos universales...</div>`;

            try {
                // Buscador inteligente de Wikipedia para corregir tildes y nombres comunes
                const searchUrl = `https://es.wikipedia.org/w/api.php?action=query&list=search&srsearch=${encodeURIComponent(query)}&format=json&origin=*&srlimit=1`;
                const searchRes = await fetch(searchUrl);
                const searchDatos = await searchRes.json();

                if (!searchDatos.query.search || searchDatos.query.search.length === 0) {
                    contenedor.innerHTML = `<p style="color: red; padding: 20px;">No encontramos datos para "${query}". Intenta con otra palabra.</p>`;
                    return;
                }

                const tituloCorregido = searchDatos.query.search[0].title;

                // Pedimos el artículo completo
                const wikiUrl = `https://es.wikipedia.org/w/api.php?action=query&prop=extracts|pageimages&format=json&origin=*&titles=${encodeURIComponent(tituloCorregido)}&redirects=1&piprop=thumbnail&pithumbsize=800`;
                const wikiRes = await fetch(wikiUrl);
                const wikiDatos = await wikiRes.json();

                const paginas = wikiDatos.query.pages;
                const pageId = Object.keys(paginas)[0];
                
                const articulo = paginas[pageId];
                let tituloOficial = articulo.title; 
                let textoHTML = articulo.extract; 

                // Limpieza de secciones finales
                textoHTML = textoHTML.split(/<h2>\s*(?:Referencias|Enlaces externos|Bibliografía|Véase también)\s*<\/h2>/i)[0];

                // Imagen destacada
                const imagenUrl = articulo.thumbnail ? articulo.thumbnail.source : 'https://images.unsplash.com/photo-1448375240586-882707db888b?w=900';

                // Búsqueda en GBIF para Taxonomía exacta
                const gbifUrl = `https://api.gbif.org/v1/species/search?q=${encodeURIComponent(tituloOficial)}&limit=15`;
                const gbifRes = await fetch(gbifUrl);
                const gbifDatos = await gbifRes.json();

                let ciencia = {};
                if (gbifDatos.results && gbifDatos.results.length > 0) {
                    // Buscamos si el resultado es una planta, hongo o animal real, ignorando arañas e insectos pequeños si es posible
                    ciencia = gbifDatos.results.find(r => r.kingdom === 'Plantae' || r.kingdom === 'Animalia' && r.class !== 'Arachnida' && r.class !== 'Insecta') || gbifDatos.results[0];
                }

                let reino = ciencia.kingdom || "Falta registrar";
                let filo = ciencia.phylum || ciencia.division || "Magnoliophyta (Plantas con flor)";
                let clase = ciencia.class || "Magnoliopsida";
                let familia = ciencia.family || "Desconocida";
                let nombreCientifico = ciencia.scientificName || tituloOficial;

                // Corrección manual rápida para casos especiales conocidos
                if (tituloOficial.toLowerCase() === "perro") {
                    nombreCientifico = "Canis lupus familiaris"; reino = "Animalia"; filo = "Chordata"; clase = "Mammalia"; familia = "Canidae";
                } else if (tituloOficial.toLowerCase().includes("dodo")) {
                    nombreCientifico = "Raphus cucullatus"; reino = "Animalia"; filo = "Chordata"; clase = "Aves"; familia = "Columbidae";
                }

                // --- CEREBRO DE EXTRACCIÓN ANATÓMICA / BOTÁNICA ---
                let detallesEstructura = "Revisar la descripción morfológica detallada en el texto completo abajo.";
                const temporalDiv = document.createElement('div');
                temporalDiv.innerHTML = textoHTML;
                const parrafos = temporalDiv.getElementsByTagName('p');
                
                // Si detecta que es una planta, busca características botánicas. Si es animal, busca anatomía.
                const palabrasClave = reino.toLowerCase() === 'plantae' 
                    ? ["hojas", "tallo", "raíz", "flores", "fruto", "semillas", "árbol", "arbusto", "corteza", "mide"]
                    : ["mide", "peso", "esqueleto", "cráneo", "cuerpo", "plumaje", "patas", "garras", "pelo"];

                for (let p of parrafos) {
                    let textMin = p.textContent.toLowerCase();
                    let coincide = palabrasClave.some(palabra => textMin.includes(palabra));
                    
                    if (coincide && p.textContent.length > 70 && p.textContent.length < 320) {
                        detallesEstructura = p.textContent;
                        break;
                    }
                }

                // Cambiamos el nombre de la caja según si es planta o animal
                const nombreCajaAnatomia = reino.toLowerCase() === 'plantae' ? "Morfología y Estructura Vegetal" : "Anatomía y Estructura Corporal";

                contenedor.innerHTML = `
                    <div class="species-card">
                        <img class="species-image" src="${imagenUrl}" alt="${tituloOficial}">
                        <div class="species-content">
                            <h2 class="species-title">${tituloOficial}</h2>
                            <div class="species-scientific">${nombreCientifico}</div>
                            
                            <div class="info-wrapper">
                                <div class="taxo-box">
                                    <h3>Clasificación Biológica</h3>
                                    <div class="taxo-grid">
                                        <div class="taxo-item"><strong>Reino:</strong> ${reino}</div>
                                        <div class="taxo-item"><strong>Filo/División:</strong> ${filo}</div>
                                        <div class="taxo-item"><strong>Clase:</strong> ${clase}</div>
                                        <div class="taxo-item"><strong>Familia:</strong> ${familia}</div>
                                    </div>
                                </div>
                                
                                <div class="anatomy-box">
                                    <h3>${nombreCajaAnatomia}</h3>
                                    <div class="anatomy-list">
                                        <div class="anatomy-item"><strong>Detalles Clave:</strong> ${detallesEstructura}</div>
                                    </div>
                                </div>
                            </div>

                            <div class="wiki-full-content">
                                ${textoHTML}
                            </div>
                        </div>
                    </div>
                `;

            } catch (error) {
                console.error(error);
                contenedor.innerHTML = `<p style="color: red; padding: 20px;">Error al conectar con los servidores biológicos.</p>`;
            }
        }
    </script>

</body>
</html>
