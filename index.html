<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Arkheia | Enciclopedia Universal de Biodiversidad</title>
    
    <style>
        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background-color: #f0f4f1;
            color: #2c3e50;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }
        .search-container {
            background: white;
            padding: 35px;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.08);
            max-width: 700px;
            width: 90%;
            text-align: center;
            margin-top: 30px;
        }
        h1 {
            color: #1b4d3e; 
            font-size: 3.5rem;
            margin: 0 0 10px 0;
            font-weight: 800;
            letter-spacing: -1px;
        }
        .subtitle {
            color: #7f8c8d;
            margin-bottom: 25px;
            font-size: 1.1rem;
        }
        .search-box {
            display: flex;
            gap: 12px;
            margin-bottom: 20px;
        }
        input[type="text"] {
            flex: 1;
            padding: 15px;
            border: 2px solid #e0e0e0;
            border-radius: 12px;
            font-size: 16px;
            outline: none;
            transition: border-color 0.3s;
        }
        input[type="text"]:focus {
            border-color: #1b4d3e;
        }
        button {
            background-color: #1b4d3e;
            color: white;
            border: none;
            padding: 15px 28px;
            border-radius: 12px;
            cursor: pointer;
            font-size: 16px;
            font-weight: bold;
            transition: background 0.2s;
        }
        button:hover {
            background-color: #113327;
        }
        /* Estilos de la Ficha del Animal */
        .species-card {
            background: #ffffff;
            border-radius: 16px;
            overflow: hidden;
            box-shadow: 0 5px 15px rgba(0,0,0,0.05);
            margin-top: 30px;
            text-align: left;
            border: 1px solid #eef2f0;
        }
        .species-image {
            width: 100%;
            max-height: 350px;
            object-fit: cover;
            background-color: #eaeaea;
        }
        .species-content {
            padding: 25px;
        }
        .species-title {
            font-size: 2rem;
            color: #1b4d3e;
            margin: 0 0 5px 0;
        }
        .species-scientific {
            font-style: italic;
            color: #7f8c8d;
            margin-bottom: 15px;
        }
        .description-text {
            line-height: 1.6;
            margin-bottom: 20px;
            font-size: 1.05rem;
        }
        .taxo-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 10px;
            background: #f8faf9;
            padding: 15px;
            border-radius: 8px;
        }
        .taxo-item {
            font-size: 0.95rem;
        }
        .taxo-item strong {
            color: #1b4d3e;
        }
        .loading {
            color: #7f8c8d;
            font-style: italic;
            padding: 20px;
        }
    </style>
</head>
<body>

    <div class="search-container">
        <h1>Arkheia</h1>
        <div class="subtitle">El motor de búsqueda definitivo para la biodiversidad y especies extintas.</div>
        
        <div class="search-box">
            <input type="text" id="animalInput" placeholder="Busca un animal (Ej: León, T-Rex, Dodo, Puma...)">
            <button onclick="ejecutarBusquedaCompleta()">Explorar</button>
        </div>
        
        <div id="resultado"></div>
    </div>

    <script>
        async function ejecutarBusquedaCompleta() {
            const query = document.getElementById('animalInput').value.trim();
            const contenedor = document.getElementById('resultado');
            
            if(!query) {
                alert("Escribe el nombre de una especie primero.");
                return;
            }

            contenedor.innerHTML = `<div class="loading">Consultando bases de datos biológicas y archivos enciclopédicos...</div>`;

            try {
                // 1. Buscamos primero en Wikipedia para obtener texto e imagen en español
                const wikiUrl = `https://es.wikipedia.org/api/rest_v1/page/summary/${encodeURIComponent(query)}`;
                const wikiRes = await fetch(wikiUrl);
                
                // 2. Buscamos en la base de datos científica GBIF para taxonomía
                const gbifUrl = `https://api.gbif.org/v1/species/search?q=${encodeURIComponent(query)}&limit=1`;
                const gbifRes = await fetch(gbifUrl);
                
                const wikiDatos = await wikiRes.json();
                const gbifDatos = await gbifRes.json();

                if (wikiDatos.type === 'standard' || (gbifDatos.results && gbifDatos.results.length > 0)) {
                    
                    // Extraemos datos de Wikipedia
                    const titulo = wikiDatos.title || query;
                    const descripcion = wikiDatos.extract || "No hay una descripción detallada disponible en este momento.";
                    const imagenUrl = wikiDatos.thumbnail ? wikiDatos.thumbnail.source : 'https://images.unsplash.com/photo-1546182990-dffeafbe841d?w=700'; // Imagen por defecto si no hay
                    
                    // Extraemos datos científicos de GBIF
                    const ciencia = gbifDatos.results[0] || {};
                    const nombreCientifico = ciencia.scientificName || "Clasificación no registrada";
                    const reino = ciencia.kingdom || "Animalia/Plantae";
                    const filo = ciencia.phylum || "No registrado";
                    const clase = ciencia.class || "No registrado";
                    const familia = ciencia.family || "No registrado";

                    // Inyectamos todo el contenido estructurado en la interfaz
                    contenedor.innerHTML = `
                        <div class="species-card">
                            <img class="species-image" src="${imagenUrl}" alt="${titulo}">
                            <div class="species-content">
                                <h2 class="species-title">${titulo}</h2>
                                <div class="species-scientific">${nombreCientifico}</div>
                                <p class="description-text">${descripcion}</p>
                                
                                <h3>Clasificación Biológica</h3>
                                <div class="taxo-grid">
                                    <div class="taxo-item"><strong>Reino:</strong> ${reino}</div>
                                    <div class="taxo-item"><strong>Filo:</strong> ${filo}</div>
                                    <div class="taxo-item"><strong>Clase:</strong> ${clase}</div>
                                    <div class="taxo-item"><strong>Familia:</strong> ${familia}</div>
                                </div>
                            </div>
                        </div>
                    `;
                } else {
                    contenedor.innerHTML = `<p style="color: red; padding: 20px;">No encontramos datos suficientes sobre "${query}". Intenta verificar la ortografía o usar nombres comunes conocidos.</p>`;
                }

            } catch (error) {
                console.error(error);
                contenedor.innerHTML = `<p style="color: red; padding: 20px;">Error al conectar con los servidores de Arkheia.</p>`;
            }
        }
    </script>

</body>
</html>
